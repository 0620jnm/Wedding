<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <title>Jay & Michelle's Wedding</title>
    <style>
        body {
            background-color: #1a1512;
            background-image: radial-gradient(circle at top, #3d342c 0%, #1a1512 100%);
            color: #e0d5c1;
            font-family: "PingFang TC", "STHeiti", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 100px 20px 30px; 
            position: relative;
            width: 100%;
        }

        .welcome-text {
            font-family: 'Pinyon Script', cursive !important;
            color: #d4a373;
            font-size: 8rem; 
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            opacity: 0.4;
            white-space: nowrap;
        }

        .main-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 2.2rem;
            margin: 0;
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }

        .main-container {
            width: 85%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-top: 20px;
            box-sizing: border-box;
        }

        .action-btn {
            background-color: #d4a373;
            color: #1a1512;
            text-decoration: none;
            padding: 18px 10px; 
            border-radius: 15px;
            display: block; 
            margin-bottom: 20px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%; 
            box-sizing: border-box; 
            text-align: center;
        }

        .gallery-btn {
            background: transparent;
            color: #d4a373;
            border: 1px solid #d4a373;
            margin-bottom: 0;
        }

        .btn-en { display: block; font-family: 'Bodoni Moda', serif; font-size: 1.2rem; }
        .btn-ch { display: block; font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }

        #status-msg { margin: 20px 0 0; font-size: 0.9rem; color: #d4a373; min-height: 1.2rem; font-weight: bold; }
        .footer { margin-top: auto; padding: 40px; font-size: 0.7rem; color: #5d5245; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <span class="welcome-text">Welcome</span>
        <h1 class="main-title">Jay & Michelle's Wedding</h1>
    </div>

    <div class="main-container">
        <label for="file-upload" class="action-btn">
            <span class="btn-en">UPLOAD PHOTO</span>
            <span class="btn-ch">點擊分享 ‧ 當日美照</span>
        </label>
        <input id="file-upload" type="file" style="display:none" accept="image/*" multiple>
        
        <a href="https://drive.google.com/drive/folders/1woOc6AZ8ilHubBUYpeBKlPX6s3k5u_-j?usp=sharing" id="album-link" target="_blank" class="action-btn gallery-btn">
            <span class="btn-en">GUEST GALLERY</span>
            <span class="btn-ch">進入相簿 ‧ 下載回憶</span>
        </a>

        <div id="status-msg"></div>
    </div>

    <div class="footer">MARCH 04, 2026 | TAIPEI</div>

    <script>
        // --- 務必更換為你最新部署的 /exec 網址 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxPbIU-rY7vWBV59KVOlKxIgdsLE_dMri7BqvjEL1itvZClO3RQjTpAk3EkHh-teHYD3g/exec"; 

        const fileInput = document.getElementById('file-upload');
        const statusMsg = document.getElementById('status-msg');

        fileInput.addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusMsg.innerText = `正在傳送 (${i+1}/${files.length})...`;

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const payload = {
                        filename: file.name,
                        contentType: file.type,
                        base64: base64Data
                    };

                    try {
                        // 使用傳統 XHR 繞過一些 Fetch 的嚴格限制
                        const xhr = new XMLHttpRequest();
                        xhr.open("POST", GAS_URL, true);
                        xhr.onreadystatechange = function() {
                            if (xhr.readyState === 4) {
                                statusMsg.innerText = "成功分享！感謝您的祝福";
                            }
                        };
                        xhr.send(JSON.stringify(payload));
                    } catch (err) {
                        statusMsg.innerText = "連線異常，請重試";
                    }
                };
            }
        });
    </script>
</body>
</html>
