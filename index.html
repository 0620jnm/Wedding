<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <title>Jay & Michelle's Wedding</title>
    <style>
        /* --- 恢復原始黑金奢華風 --- */
        body {
            background-color: #1a1512;
            background-image: radial-gradient(circle at top, #3d342c 0%, #1a1512 100%);
            color: #e0d5c1;
            font-family: "PingFang TC", "STHeiti", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 100px 20px 30px; 
            position: relative;
        }

        .welcome-text {
            font-family: 'Pinyon Script', cursive;
            color: #d4a373;
            font-size: 8rem; 
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            opacity: 0.4;
            white-space: nowrap;
        }

        .main-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 2.2rem;
            margin: 0;
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }

        .main-container {
            width: 85%;
            max-width: 380px; /* 稍微縮小寬度讓比例更精緻 */
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-top: 20px;
            box-sizing: border-box; /* 確保寬度計算正確 */
        }

        /* 修正按鈕對齊 */
