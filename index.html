<style>
    /* --- 調整後的視覺設定 --- */
    .main-container {
        width: 80%; /* 縮小寬度 */
        max-width: 320px; /* 手機上更精緻 */
        background: rgba(255, 255, 255, 0.08); 
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 20px; /* 圓角縮小 */
        padding: 25px 20px; /* 內距縮小 */
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        align-items: center; /* 確保內容置中不歪斜 */
    }

    .action-btn {
        background-color: #d4a373;
        color: #1a1512;
        text-decoration: none;
        padding: 12px; /* 按鈕變瘦 */
        border-radius: 12px;
        display: flex; /* 改用 flex 確保文字垂直置中 */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        font-weight: bold;
        transition: 0.3s;
        cursor: pointer;
        border: none;
        width: 100%; /* 寬度跟隨容器 */
        box-sizing: border-box;
    }

    .gallery-btn {
        background: transparent;
        color: #d4a373;
        border: 1px solid #d4a373;
        margin-bottom: 0; /* 最後一個按鈕不留底邊 */
    }

    .btn-en { font-family: 'Bodoni Moda', serif; font-size: 1rem; } /* 字體縮小 */
    .btn-ch { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
</style>
