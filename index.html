<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <title>Jay & Michelle's Wedding</title>
    <style>
        /* --- 視覺設計：黑金奢華微調版 --- */
        body {
            background-color: #1a1512;
            background-image: radial-gradient(circle at top, #3d342c 0%, #1a1512 100%);
            color: #e0d5c1;
            font-family: "PingFang TC", "STHeiti", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 80px 20px 20px; 
            position: relative;
        }

        .welcome-text {
            font-family: 'Pinyon Script', cursive;
            color: #d4a373;
            font-size: 6rem; /* 稍微縮小避免溢出 */
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            opacity: 0.3;
            white-space: nowrap;
        }

        .main-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 1.8rem; /* 標題縮小更優雅 */
            margin: 0;
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }

        .main-container {
            width: 75%; /* 容器縮小 */
            max-width: 300px; 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center; /* 確保內容置中 */
        }

        .action-btn {
            background-color: #d4a373;
            color: #1a1512;
            text-decoration: none;
            padding: 12px 0; /* 按鈕變瘦 */
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%; /* 寬度統一 */
            box-sizing: border-box;
        }

        .gallery-btn {
            background: transparent;
            color: #d4a373;
            border: 1px solid #d4a373;
            margin-bottom: 0;
        }

        .action-btn:active {
            transform: scale(0.98);
            opacity: 0.8;
        }

        .btn-en { font-family: 'Bodoni Moda', serif; font-size: 1rem; letter-spacing: 1px; }
        .btn-ch { font-size: 0.7rem; opacity: 0.9; margin-top: 2px; letter-spacing: 1px; }

        #status-msg { 
            margin: 15px 0 5px; 
            font-size: 0.8rem; 
            color: #d4a373; 
            min-height: 1.2rem;
            line-height: 1.4;
        }

        .footer { 
            margin-top: auto; 
            padding: 40px; 
            font-size: 0.65rem; 
            color: #5d5245; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="welcome-text">Welcome</span>
        <h1 class="main-title">Jay & Michelle</h1>
    </div>

    <div class="main-container">
        <label for="file-upload" class="action-btn">
            <span class="btn-en">UPLOAD PHOTO</span>
            <span class="btn-ch">分享婚禮喜悅</span>
        </label>
        <input id="file-upload" type="file" style="display:none" accept="image/*" multiple>
        
        <div id="status-msg">點擊上方按鈕上傳照片</div>

        <a href="這裡貼上你的GoogleDrive資料夾連結" target="_blank" class="action-btn gallery-btn">
