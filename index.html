<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <title>Jay & Michelle's Wedding</title>
    <style>
    /* --- 調整後的視覺設定 --- */
    .main-container {
        width: 80%; /* 縮小寬度 */
        max-width: 320px; /* 手機上更精緻 */
        background: rgba(255, 255, 255, 0.08); 
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 20px; /* 圓角縮小 */
        padding: 25px 20px; /* 內距縮小 */
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        align-items: center; /* 確保內容置中不歪斜 */
    }

    .action-btn {
        background-color: #d4a373;
        color: #1a1512;
        text-decoration: none;
        padding: 12px; /* 按鈕變瘦 */
        border-radius: 12px;
        display: flex; /* 改用 flex 確保文字垂直置中 */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        font-weight: bold;
        transition: 0.3s;
        cursor: pointer;
        border: none;
        width: 100%; /* 寬度跟隨容器 */
        box-sizing: border-box;
    }

    .gallery-btn {
        background: transparent;
        color: #d4a373;
        border: 1px solid #d4a373;
        margin-bottom: 0; /* 最後一個按鈕不留底邊 */
    }

    .btn-en { font-family: 'Bodoni Moda', serif; font-size: 1rem; } /* 字體縮小 */
    .btn-ch { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
</style>
</head>
<body>

    <div class="header">
        <span class="welcome-text">Welcome</span>
        <h1 class="main-title">Jay & Michelle's Wedding</h1>
    </div>

    <div class="main-container">
        <label for="file-upload" class="action-btn">
            <span class="btn-en">UPLOAD PHOTO</span>
            <span class="btn-ch">點擊分享 ‧ 當日美照</span>
        </label>
        <input id="file-upload" type="file" style="display:none" accept="image/*" multiple>
        
        <div id="status-msg"></div>

        <a href="你的GoogleDrive資料夾連結" target="_blank" class="action-btn gallery-btn">
            <span class="btn-en">GUEST GALLERY</span>
            <span class="btn-ch">進入相簿 ‧ 下載回憶</span>
        </a>
    </div>

    <div class="footer">MARCH 04, 2026 | TAIPEI</div>

    <script>
        // --- 這裡填入你的 GAS 網址 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycb...你的序號.../exec"; 

        const fileInput = document.getElementById('file-upload');
        const statusMsg = document.getElementById('status-msg');

        fileInput.addEventListener('change', async function(e) {
            const files = e.target.files;
            if (files.length === 0) return;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusMsg.innerText = `正在上傳 (${i+1}/${files.length})...`;

                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = async () => {
                        const base64Data = reader.result.split(',')[1];
                        const payload = {
                            filename: file.name,
                            contentType: file.type,
                            base64: base64Data
                        };

                        const resp = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify(payload)
                        });

                        const result = await resp.json();
                        if (result.result === "success") {
                            statusMsg.innerText = "成功分享！感謝您的祝福";
                        } else {
                            statusMsg.innerText = "上傳失敗，請再試一次";
                        }
                    };
                } catch (err) {
                    statusMsg.innerText = "發生錯誤，請檢查網路";
                }
            }
        });
    </script>
</body>
</html>
