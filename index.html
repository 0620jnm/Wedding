<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&family=Playfair+Display:wght@700&family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <title>Jay & Michelle's Wedding</title>
    <style>
        /* 動畫定義 */
        @keyframes fadeInSimple {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInWelcome {
            from { opacity: 0; transform: translate(-50%, 15px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        body { 
            background-color: #1a1512; 
            background-image: radial-gradient(circle at top, #3d342c 0%, #1a1512 100%); 
            color: #e0d5c1; 
            font-family: 'Bodoni Moda', serif;
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden;
        }

        .header { text-align: center; padding: 130px 20px 30px; position: relative; width: 100%; }
        
        /* 1. Welcome 置中、指定字體、最後淡入 */
        .welcome-text { 
            font-family: 'Monsieur La Doulaise', cursive !important; 
            color: #d4a373; 
            font-size: 6.5rem; 
            position: absolute; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 0; 
            opacity: 0; 
            white-space: nowrap;
            /* 所有元素(約1.5s)出現後，2s開始最後淡入 */
            animation: fadeInWelcome 2s ease-out 2s forwards; 
        }

        /* 2. 主標題指定字體 */
        .main-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 2rem; 
            margin: 0; 
            position: relative; 
            z-index: 1; 
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeInSimple 1.5s ease-out 0.3s forwards; 
        }
        
        .main-container { 
            width: 85%; 
            max-width: 380px; 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px); 
            border-radius: 30px; 
            padding: 40px 30px; 
            text-align: center; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            margin-top: 20px; 
            box-sizing: border-box; 
            opacity: 0;
            animation: fadeInSimple 1.5s ease-out 0.8s forwards; 
        }

        .action-btn { 
            background-color: #d4a373; 
            color: #1a1512; 
            padding: 18px 10px; 
            border-radius: 15px; 
            display: block; 
            margin-bottom: 20px; 
            font-weight: bold; 
            width: 100%; 
            border: none; 
            cursor: pointer;
            text-decoration: none;
        }

        .gallery-btn { background: transparent; color: #d4a373; border: 1px solid #d4a373; margin-bottom: 0; }
        
        .btn-en { display: block; font-family: 'Playfair Display', serif; font-size: 1.1rem; }
        .btn-ch { display: block; font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }

        .progress-container { width: 100%; background-color: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; display: none; overflow: hidden; height: 10px; }
        #progress-bar { width: 2%; height: 100%; background-color: #d4a373; transition: width 0.4s; }
        
        .uploading-anim { animation: pulse 1.5s infinite ease-in-out; }

        #status-msg { 
            margin-top: 15px; 
            font-size: 0.9rem; 
            color: #d4a373; 
            min-height: 3rem; 
            white-space: pre-wrap; 
            line-height: 1.6;
            opacity: 0;
            animation: fadeInSimple 1.5s ease-out 1.2s forwards;
        }

        /* 成功訊息專用淡入類別 */
        .final-success {
            color: #ffffff !important;
            animation: fadeInSimple 1.5s ease-out forwards !important;
        }

        .footer { 
            margin-top: auto; 
            padding: 40px; 
            font-size: 0.7rem; 
            color: #5d5245; 
            letter-spacing: 2px; 
            opacity: 0;
            animation: fadeInSimple 2s ease-out 1.5s forwards;
        }
    </style>
</head>
<body>
    <div class="header">
        <span class="welcome-text">Welcome</span>
        <h1 class="main-title">Jay & Michelle's Wedding</h1>
    </div>
    
    <div class="main-container">
        <label for="file-upload" class="action-btn">
            <span class="btn-en">UPLOAD PHOTOS</span>
            <span class="btn-ch">點擊分享 ‧ 批量上傳</span>
        </label>
        <input id="file-upload" type="file" style="display:none" accept="image/*" multiple>
        
        <a href="https://drive.google.com/drive/folders/1woOc6AZ8ilHubBUYpeBKlPX6s3k5u_-j" target="_blank" class="action-btn gallery-btn">
            <span class="btn-en">GUEST GALLERY</span>
            <span class="btn-ch">進入相簿 ‧ 下載回憶</span>
        </a>

        <div class="progress-container" id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="status-msg">請選擇照片分享喜悅</div>
    </div>

    <div class="footer">MARCH 04, 2026 | TAIPEI</div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxPbIU-rY7vWBV59KVOlKxIgdsLE_dMri7BqvjEL1itvZClO3RQjTpAk3EkHh-teHYD3g/exec"; 
        const fileInput = document.getElementById('file-upload');
        const statusMsg = document.getElementById('status-msg');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        
        let isUploading = false;

        window.onbeforeunload = function() {
            if (isUploading) return "照片尚在上傳中...";
        };

        fileInput.addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            isUploading = true;
            progressContainer.style.display = 'block';
            progressBar.style.width = "5%";
            statusMsg.classList.add('uploading-anim');
            statusMsg.style.color = "#d4a373";
            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                try {
                    statusMsg.innerText = `正在上傳中 (${i + 1}/${files.length})\n請不要關閉頁面，以免導致上傳失敗`;
                    const base64Data = await compressImage(files[i]);
                    await fetch(GAS_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({ filename: files[i].name, contentType: "image/jpeg", base64: base64Data })
                    });
                    successCount++;
                    progressBar.style.width = Math.round((successCount / files.length) * 100) + "%";
                } catch (err) { console.error(err); }
            }

            isUploading = false;
            statusMsg.classList.remove('uploading-anim');
            
            // 3. 修正：強制觸發上傳完成文字的淡入
            statusMsg.innerText = ""; 
            statusMsg.style.opacity = "0";
            setTimeout(() => {
                statusMsg.innerText = "上傳完成！謝謝您的分享！✨";
                statusMsg.classList.add('final-success');
            }, 100);
            
            setTimeout(() => { 
                progressContainer.style.display = 'none'; 
                progressBar.style.width = "0%"; 
            }, 6000);
        });

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width; let height = img.height;
                        const max_size = 2200; 
                        if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                        else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.82).split(',')[1]);
                    };
                };
            });
        }
    </script>
</body>
</html>
