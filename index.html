<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Bodoni+Moda:wght@400;700&display=swap" rel="stylesheet">
    <title>Jay & Michelle's Wedding</title>
    <style>
        body {
            background-color: #1a1512;
            background-image: radial-gradient(circle at top, #3d342c 0%, #1a1512 100%);
            color: #e0d5c1;
            font-family: "PingFang TC", "STHeiti", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 100px 20px 30px; 
            position: relative;
            width: 100%;
        }

        .welcome-text {
            font-family: 'Pinyon Script', cursive !important;
            color: #d4a373;
            font-size: 8rem; 
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            opacity: 0.4;
            white-space: nowrap;
        }

        .main-title {
            font-family: 'Bodoni Moda', serif;
            font-size: 2.2rem;
            margin: 0;
            position: relative;
            z-index: 1;
            letter-spacing: 2px;
        }

        .main-container {
            width: 85%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            margin-top: 20px;
            box-sizing: border-box;
        }

        .action-btn {
            background-color: #d4a373;
            color: #1a1512;
            text-decoration: none;
            padding: 18px 10px; 
            border-radius: 15px;
            display: block; 
            margin-bottom: 20px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%; 
            box-sizing: border-box; 
            text-align: center;
        }

        .gallery-btn {
            background: transparent;
            color: #d4a373;
            border: 1px solid #d4a373;
            margin-bottom: 0;
        }

        .btn-en { display: block; font-family: 'Bodoni Moda', serif; font-size: 1.2rem; }
        .btn-ch { display: block; font-size: 0.8rem; opacity: 0.8; margin-top: 4px; }

        #status-msg { margin: 20px 0 0; font-size: 0.9rem; color: #d4a373; min-height: 1.2rem; line-height: 1.5; }
        .footer { margin-top: auto; padding: 40px; font-size: 0.7rem; color: #5d5245; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="header">
        <span class="welcome-text">Welcome</span>
        <h1 class="main-title">Jay & Michelle's Wedding</h1>
    </div>

    <div class="main-container">
        <label for="file-upload" class="action-btn">
            <span class="btn-en">UPLOAD PHOTOS</span>
            <span class="btn-ch">點擊分享 ‧ 批量上傳</span>
        </label>
        <input id="file-upload" type="file" style="display:none" accept="image/*" multiple>
        
        <a href="https://drive.google.com/drive/folders/1woOc6AZ8ilHubBUYpeBKlPX6s3k5u_-j" target="_blank" class="action-btn gallery-btn">
            <span class="btn-en">GUEST GALLERY</span>
            <span class="btn-ch">進入相簿 ‧ 下載回憶</span>
        </a>

        <div id="status-msg"></div>
    </div>

    <div class="footer">MARCH 04, 2026 | TAIPEI</div>

    <script>
        // 【重要】請務必填入你正確的 GAS 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxPbIU-rY7vWBV59KVOlKxIgdsLE_dMri7BqvjEL1itvZClO3RQjTpAk3EkHh-teHYD3g/exec"; 

        const fileInput = document.getElementById('file-upload');
        const statusMsg = document.getElementById('status-msg');

        fileInput.addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            statusMsg.style.color = "#d4a373";
            let successCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusMsg.innerText = `正在處理第 ${i + 1}/${files.length} 張...\n(高畫質傳輸中)`;

                try {
                    // 1. 溫和壓縮圖片
                    const base64Data = await compressImage(file);
                    
                    // 2. 上傳至 GAS
                    await uploadFile(file.name, base64Data);
                    
                    successCount++;
                    statusMsg.innerText = `已成功上傳 (${successCount}/${files.length}) 張 ✨`;
                } catch (err) {
                    console.error(err);
                    statusMsg.innerText = `第 ${i + 1} 張失敗，正在繼續下一張...`;
                }
            }

            statusMsg.innerText = `完成！共上傳 ${successCount} 張照片\n謝謝你們紀錄我們的幸福 ❤️`;
            statusMsg.style.color = "#8db600";
        });

        // 上傳邏輯
        function uploadFile(name, base64) {
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open("POST", GAS_URL, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200 || xhr.status === 0) resolve();
                        else reject();
                    }
                };
                xhr.send(JSON.stringify({
                    filename: name,
                    contentType: "image/jpeg",
                    base64: base64
                }));
            });
        }
